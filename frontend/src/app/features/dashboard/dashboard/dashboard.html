<app-listening-stats-filters
  class="card"
  (timeRangeChange)="changeTimeRange($event)"
  [selectedTimeRange]="selectedTimeRange()"
  [(selectedArtistsRange)]="selectedArtistsRange"
  [(selectedTracksRange)]="selectedTracksRange"
  [tracksFoundRatio]="tracksFoundRatio()"
  [artistsFoundRatio]="artistsFoundRatio()"
></app-listening-stats-filters>
<app-average-bpm
  class="card"
  [averageBpm]="averageBpm()"
  [isLoading]="isAudioStatsLoading()"
></app-average-bpm>
<app-average-audio-features
  class="card"
  [audioStats]="audioStats()"
  [isLoading]="isAudioStatsLoading()"
></app-average-audio-features>
<app-most-listened-tracks
  class="card"
  [timeRange]="selectedTimeRange()"
  [tracks]="topTracks()?.items ?? []"
  [audioFeatures]="audioFeatures()"
  [isLoading]="isAudioStatsLoading()"
></app-most-listened-tracks>
<app-most-listened-artists
  class="card"
  [timeRange]="selectedTimeRange()"
  [artists]="topArtists()?.items ?? []"
  [artistGenres]="artistGenres()"
  [isLoading]="isTopArtistsLoading()"
  [hasError]="hasTopArtistsError()"
  (retryRequested)="retryTopArtists()"
></app-most-listened-artists>
<app-genre-distribution
  class="card"
  [distribution]="genreDistribution()"
  [timeRange]="selectedTimeRange()"
  [isLoading]="isGenreDistributionLoading()"
  [hasError]="hasGenreDistributionError()"
></app-genre-distribution>
