<div class="bpm-header">
  <app-icon name="bpm" />
  <div class="bpm-heading-container">
    <h3>Średnie BPM</h3>
    <p class="bpm-description">Obliczane na podstawie Twoich ulubionych utworów</p>
  </div>
</div>

<div class="bpm-value-container">
  @if (isLoading()) {
  <div class="skeleton bpm-skeleton" aria-label="Ładowanie średniego BPM"></div>
  } @else if (averageBpm() !== null) {
  <p class="bpm-value">{{ averageBpm() }} BPM</p>
  } @else {
  <p class="bpm-empty">Brak danych</p>
  }
</div>
