<main class="relative grid min-h-screen place-items-center overflow-hidden px-[2rem] py-[4rem]">
  <div class="pointer-events-none absolute inset-0 grid place-items-center" aria-hidden="true">
    <div
      class="login-background-image h-[min(82rem,135vw)] w-[min(82rem,135vw)] bg-[url('/logo.png')] bg-contain bg-center bg-no-repeat opacity-[0.08]"
    ></div>
  </div>

  <section class="relative z-[1] flex w-full max-w-[34rem] flex-col items-center text-center">
    <h1 class="text-[length:var(--text-3xl)] font-[var(--font-weight-bold)]">
      BeatRoute
    </h1>

    <button
      class="mt-[3.6rem] inline-flex min-h-[6.4rem] w-full cursor-pointer items-center justify-center rounded-[var(--radius-pill)] border border-[var(--color-border)] bg-[var(--color-surface)] px-[3rem] py-[1.5rem] [font-size:2rem] font-[var(--font-weight-bold)] leading-[1.1] text-[var(--color-text-primary)] shadow-[0_1.2rem_3.2rem_rgba(255,255,255,0.22)] [transition:transform_var(--transition-fast),box-shadow_var(--transition-fast),background-color_var(--transition-fast)] hover:bg-[var(--color-surface-secondary)] hover:shadow-[0_1.6rem_4rem_rgba(255,255,255,0.32)] hover:[transform:translateY(-0.2rem)] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[var(--color-accent)] active:[transform:translateY(0)]"
      (click)="login()">
      Zaloguj przez Spotify
    </button>
  </section>
</main>
